- generic [ref=e2]: "{ \"articles\": [ { \"id\": \"ansible-vs-terraform-en\", \"title\": \"Ansible vs Terraform: When to Use Each\", \"date\": \"2026-04-18\", \"tags\": [ \"ansible\", \"terraform\", \"devops\", \"automation\", \"iac\" ], \"lang\": \"en\", \"content\": \"## Ansible vs Terraform: Practical Comparison\\n\\nTwo fundamental tools for infrastructure as code, but with different scopes. Let's analyze when to use each.\\n\\n### Ansible (Configuration Management)\\n\\nIdeal for:\\n- Configuring existing servers\\n- Application deployments\\n- Repeatable tasks (playbooks)\\n- Agentless (SSH)\\n\\n### Terraform (Infrastructure Provisioning)\\n\\nIdeal for:\\n- Creating infrastructure from scratch\\n- Cloud resources (AWS, GCP, Azure)\\n- State management\\n- Planning changes\\n\\n### Conclusion\\n\\nUse both together: Terraform for infrastructure, Ansible for configuration.\", \"html\": \"<h2>Ansible vs Terraform: Practical Comparison</h2>\\n<p>Two fundamental tools for infrastructure as code, but with different scopes. Let's analyze when to use each.</p>\\n<h3>Ansible (Configuration Management)</h3>\\n<p>Ideal for:<br>- Configuring existing servers<br>- Application deployments<br>- Repeatable tasks (playbooks)<br>- Agentless (SSH)</p>\\n<h3>Terraform (Infrastructure Provisioning)</h3>\\n<p>Ideal for:<br>- Creating infrastructure from scratch<br>- Cloud resources (AWS, GCP, Azure)<br>- State management<br>- Planning changes</p>\\n<h3>Conclusion</h3>\\n<p>Use both together: Terraform for infrastructure, Ansible for configuration.</p>\" }, { \"id\": \"ansible-vs-terraform-it\", \"title\": \"Ansible vs Terraform: Quando usare ciascuno\", \"date\": \"2026-04-18\", \"tags\": [ \"ansible\", \"terraform\", \"devops\", \"automation\", \"iac\" ], \"lang\": \"it\", \"content\": \"## Ansible vs Terraform: Confronto Pratico\\n\\nDue tool fundamentales per l'infrastructure as code, ma con scopi diversi. Analizziamo quando usare ciascuno.\\n\\n### Ansible (Configuration Management)\\n\\nIdeale per:\\n- Configurazione di server esistenti\\n- Deploy applicativi\\n- Task ripetibili (playbook)\\n- Agentless (SSH)\\n\\n### Terraform (Infrastructure Provisioning)\\n\\nIdeale per:\\n- Creare infrastruttura da zero\\n- Cloud resources (AWS, GCP, Azure)\\n- State management\\n- Pianificazione changes\\n\\n### Conclusione\\n\\nUsare entrambi insieme: Terraform per l'infrastruttura, Ansible per la configurazione.\", \"html\": \"<h2>Ansible vs Terraform: Confronto Pratico</h2>\\n<p>Due tool fundamentales per l'infrastructure as code, ma con scopi diversi. Analizziamo quando usare ciascuno.</p>\\n<h3>Ansible (Configuration Management)</h3>\\n<p>Ideale per:<br>- Configurazione di server esistenti<br>- Deploy applicativi<br>- Task ripetibili (playbook)<br>- Agentless (SSH)</p>\\n<h3>Terraform (Infrastructure Provisioning)</h3>\\n<p>Ideale per:<br>- Creare infrastruttura da zero<br>- Cloud resources (AWS, GCP, Azure)<br>- State management<br>- Pianificazione changes</p>\\n<h3>Conclusione</h3>\\n<p>Usare entrambi insieme: Terraform per l'infrastruttura, Ansible per la configurazione.</p>\" }, { \"id\": \"kernel-61-lts-en\", \"title\": \"Kernel 6.1 LTS and Long Term Support\", \"date\": \"2026-04-15\", \"tags\": [ \"kernel\", \"lts\", \"sysadmin\" ], \"lang\": \"en\", \"content\": \"## Kernel 6.1 LTS: What's New\\n\\nThe Linux 6.1 kernel marks a turning point for the LTS series. The main new features include improved hardware support and performance optimizations for server workloads.\\n\\n### Key Points\\n\\n- Better memory management for high-density systems\\n- Improved Btrfs support with more efficient checksums\\n- New drivers for datacenter NICs\", \"html\": \"<h2>Kernel 6.1 LTS: What's New</h2>\\n<p>The Linux 6.1 kernel marks a turning point for the LTS series. The main new features include improved hardware support and performance optimizations for server workloads.</p>\\n<h3>Key Points</h3>\\n<ul><li>Better memory management for high-density systems</li><li>Improved Btrfs support with more efficient checksums</li><li>New drivers for datacenter NICs</li></ul>\" }, { \"id\": \"kernel-61-lts-it\", \"title\": \"Kernel 6.1 e la Long Term Support\", \"date\": \"2026-04-15\", \"tags\": [ \"kernel\", \"lts\", \"sysadmin\" ], \"lang\": \"it\", \"content\": \"## Kernel 6.1 LTS: cosa cambia\\n\\nIl kernel Linux 6.1 segna un punto di svolta per la serie LTS. Le novità principali riguardano il supporto hardware migliorato e le ottimizzazioni di performance per carichi di lavoro server.\\n\\n### Punti chiave\\n\\n- Miglior gestione della memoria per sistemi ad alta densità\\n- Supporto Btrfs migliorato con checksum più efficienti\\n- Nuovi driver per NIC datacenter\", \"html\": \"<h2>Kernel 6.1 LTS: cosa cambia</h2>\\n<p>Il kernel Linux 6.1 segna un punto di svolta per la serie LTS. Le novità principali riguardano il supporto hardware migliorato e le ottimizzazioni di performance per carichi di lavoro server.</p>\\n<h3>Punti chiave</h3>\\n<ul><li>Miglior gestione della memoria per sistemi ad alta densità</li><li>Supporto Btrfs migliorato con checksum più efficienti</li><li>Nuovi driver per NIC datacenter</li></ul>\" }, { \"id\": \"monitoring-prometheus-en\", \"title\": \"Monitoring with Prometheus and Grafana\", \"date\": \"2026-04-10\", \"tags\": [ \"monitoring\", \"prometheus\", \"grafana\", \"observability\" ], \"lang\": \"en\", \"content\": \"## Enterprise Monitoring with Prometheus\\n\\nPrometheus and Grafana form the ideal pair for modern monitoring.\\n\\n### Prometheus\\n\\n- Time-series database\\n- Pull-based metrics\\n- PromQL for queries\\n- Service discovery\\n\\n### Grafana\\n\\n- Advanced visualizations\\n- Custom dashboards\\n- Integrated alerting\\n- Multi-source data\\n\\n### Basic Setup\\n\\n```bash\\n# Docker compose to get started\\nprometheus:\\n image: prom/prometheus\\ngrafana:\\n image: grafana/grafana\\n```\\n\\n### Best Practices\\n\\n- Custom metrics for applications\\n- SLO/SLA monitoring\\n- Alert on percentiles (P95, P99)\", \"html\": \"<h2>Enterprise Monitoring with Prometheus</h2>\\n<p>Prometheus and Grafana form the ideal pair for modern monitoring.</p>\\n<h3>Prometheus</h3>\\n<ul><li>Time-series database</li><li>Pull-based metrics</li><li>PromQL for queries</li><li>Service discovery</li></ul>\\n<h3>Grafana</h3>\\n<ul><li>Advanced visualizations</li><li>Custom dashboards</li><li>Integrated alerting</li><li>Multi-source data</li></ul>\\n<h3>Basic Setup</h3>\\n<p><code></code>`bash</p>\\n<h1>Docker compose to get started</h1>\\n<p>prometheus:<br>image: prom/prometheus<br>grafana:<br>image: grafana/grafana<br><code></code>`</p>\\n<h3>Best Practices</h3>\\n<ul><li>Custom metrics for applications</li><li>SLO/SLA monitoring</li><li>Alert on percentiles (P95, P99)</li></ul>\" }, { \"id\": \"monitoring-prometheus-it\", \"title\": \"Monitoring con Prometheus e Grafana\", \"date\": \"2026-04-10\", \"tags\": [ \"monitoring\", \"prometheus\", \"grafana\", \"observability\" ], \"lang\": \"it\", \"content\": \"## Monitoraggio Enterprise con Prometheus\\n\\nPrometheus e Grafana formano la coppia ideale per il monitoring moderno.\\n\\n### Prometheus\\n\\n- Time-series database\\n- Pull-based metrics\\n- PromQL per queries\\n- Service discovery\\n\\n### Grafana\\n\\n- Visualizzazioni avanzate\\n- Dashboards personalizzati\\n- Alerting integrato\\n- Multi-source data\\n\\n### Setup Base\\n\\n```bash\\n# Docker compose per iniziare\\nprometheus:\\n image: prom/prometheus\\ngrafana:\\n image: grafana/grafana\\n```\\n\\n### Best Practices\\n\\n- Metriche custom per applicazioni\\n- SLO/SLA monitoring\\n- Alert su percentili (P95, P99)\", \"html\": \"<h2>Monitoraggio Enterprise con Prometheus</h2>\\n<p>Prometheus e Grafana formano la coppia ideale per il monitoring moderno.</p>\\n<h3>Prometheus</h3>\\n<ul><li>Time-series database</li><li>Pull-based metrics</li><li>PromQL per queries</li><li>Service discovery</li></ul>\\n<h3>Grafana</h3>\\n<ul><li>Visualizzazioni avanzate</li><li>Dashboards personalizzati</li><li>Alerting integrato</li><li>Multi-source data</li></ul>\\n<h3>Setup Base</h3>\\n<p><code></code>`bash</p>\\n<h1>Docker compose per iniziare</h1>\\n<p>prometheus:<br>image: prom/prometheus<br>grafana:<br>image: grafana/grafana<br><code></code>`</p>\\n<h3>Best Practices</h3>\\n<ul><li>Metriche custom per applicazioni</li><li>SLO/SLA monitoring</li><li>Alert su percentili (P95, P99)</li></ul>\" }, { \"id\": \"docker-security-en\", \"title\": \"Docker Security Best Practices\", \"date\": \"2026-04-05\", \"tags\": [ \"docker\", \"security\", \"containers\", \"devops\" ], \"lang\": \"en\", \"content\": \"## Docker Security in Production\\n\\nDocker is everywhere, but security is often overlooked. Here are the best practices.\\n\\n### Minimal Images\\n\\n- Use verified official images\\n- Prefer `alpine` or `distroless`\\n- Multi-stage builds to reduce attack surface\\n\\n### Don't Run as Root\\n\\n```dockerfile\\n# Create user and use USER\\nRUN adduser -D appuser\\nUSER appuser\\n```\\n\\n### Vulnerability Scanning\\n\\n- Trivy scanner\\n- Clair\\n- Dockle for best practices\\n\\n### Network Segmentation\\n\\n- Network isolate containers\\n- Use Docker Swarm or Kubernetes network policies\\n\\n### Secrets Management\\n\\n- Never embed secrets in images\\n- Use Docker secrets or external secret managers\", \"html\": \"<h2>Docker Security in Production</h2>\\n<p>Docker is everywhere, but security is often overlooked. Here are the best practices.</p>\\n<h3>Minimal Images</h3>\\n<ul><li>Use verified official images</li><li>Prefer <code>alpine</code> or <code>distroless</code></li><li>Multi-stage builds to reduce attack surface</li></ul>\\n<h3>Don't Run as Root</h3>\\n<p><code></code>`dockerfile</p>\\n<h1>Create user and use USER</h1>\\n<p>RUN adduser -D appuser<br>USER appuser<br><code></code>`</p>\\n<h3>Vulnerability Scanning</h3>\\n<ul><li>Trivy scanner</li><li>Clair</li><li>Dockle for best practices</li></ul>\\n<h3>Network Segmentation</h3>\\n<ul><li>Network isolate containers</li><li>Use Docker Swarm or Kubernetes network policies</li></ul>\\n<h3>Secrets Management</h3>\\n<ul><li>Never embed secrets in images</li><li>Use Docker secrets or external secret managers</li></ul>\" }, { \"id\": \"docker-security-it\", \"title\": \"Docker Security Best Practices\", \"date\": \"2026-04-05\", \"tags\": [ \"docker\", \"security\", \"containers\", \"devops\" ], \"lang\": \"it\", \"content\": \"## Sicurezza Docker in Produzione\\n\\nDocker è ovunque, ma la sicurezza spesso viene trascurata. Ecco le best practices.\\n\\n### Immagini Minimali\\n\\n- Usa immagini ufficiali verificate\\n- Preferisci `alpine` o `distroless`\\n- Multi-stage builds per ridurre superficie d'attacco\\n\\n### Non Eseguire come Root\\n\\n```dockerfile\\n# Crea utente e usa USER\\nRUN adduser -D appuser\\nUSER appuser\\n```\\n\\n### Scan delle Vulnerabilità\\n\\n- Trivy scanner\\n- Clair\\n- Dockle per best practices\\n\\n### Network Segmentation\\n\\n- Network isolate i container\\n- Usa Docker Swarm o Kubernetes network policies\\n\\n### Secrets Management\\n\\n- Mai inserire secrets nelle immagini\\n- Usa Docker secrets o external secret managers\", \"html\": \"<h2>Sicurezza Docker in Produzione</h2>\\n<p>Docker è ovunque, ma la sicurezza spesso viene trascurata. Ecco le best practices.</p>\\n<h3>Immagini Minimali</h3>\\n<ul><li>Usa immagini ufficiali verificate</li><li>Preferisci <code>alpine</code> o <code>distroless</code></li><li>Multi-stage builds per ridurre superficie d'attacco</li></ul>\\n<h3>Non Eseguire come Root</h3>\\n<p><code></code>`dockerfile</p>\\n<h1>Crea utente e usa USER</h1>\\n<p>RUN adduser -D appuser<br>USER appuser<br><code></code>`</p>\\n<h3>Scan delle Vulnerabilità</h3>\\n<ul><li>Trivy scanner</li><li>Clair</li><li>Dockle per best practices</li></ul>\\n<h3>Network Segmentation</h3>\\n<ul><li>Network isolate i container</li><li>Usa Docker Swarm o Kubernetes network policies</li></ul>\\n<h3>Secrets Management</h3>\\n<ul><li>Mai inserire secrets nelle immagini</li><li>Usa Docker secrets o external secret managers</li></ul>\" }, { \"id\": \"systemd-vs-openrc-en\", \"title\": \"Systemd vs OpenRC: The Practical Guide\", \"date\": \"2026-03-28\", \"tags\": [ \"systemd\", \"openrc\", \"init\", \"comparison\" ], \"lang\": \"en\", \"content\": \"## Systemd vs OpenRC: Which to Choose?\\n\\nThe choice of init system is one of the most debated decisions in the Linux community. Let's analyze the pros and cons of both.\\n\\n**Systemd** offers an integrated ecosystem with journaling, network management, and centralized logging. **OpenRC** remains the choice for those who prefer simplicity and POSIX compliance.\", \"html\": \"<h2>Systemd vs OpenRC: Which to Choose?</h2>\\n<p>The choice of init system is one of the most debated decisions in the Linux community. Let's analyze the pros and cons of both.</p>\\n<p><strong>Systemd</strong> offers an integrated ecosystem with journaling, network management, and centralized logging. <strong>OpenRC</strong> remains the choice for those who prefer simplicity and POSIX compliance.</p>\" }, { \"id\": \"systemd-vs-openrc-it\", \"title\": \"Systemd vs OpenRC: la guida pratica\", \"date\": \"2026-03-28\", \"tags\": [ \"systemd\", \"openrc\", \"init\", \"comparison\" ], \"lang\": \"it\", \"content\": \"## Systemd vs OpenRC: quale scegliere?\\n\\nLa scelta del sistema di init è una delle decisioni più dibattute nella comunità Linux. Analizziamo pro e contro di entrambi.\\n\\n**Systemd** offre un ecosistema integrato con journaling, network management e logging centralizzato. **OpenRC** resta la scelta per chi preferisce semplicità e conformità POSIX.\", \"html\": \"<h2>Systemd vs OpenRC: quale scegliere?</h2>\\n<p>La scelta del sistema di init è una delle decisioni più dibattute nella comunità Linux. Analizziamo pro e contro di entrambi.</p>\\n<p><strong>Systemd</strong> offre un ecosistema integrato con journaling, network management e logging centralizzato. <strong>OpenRC</strong> resta la scelta per chi preferisce semplicità e conformità POSIX.</p>\" }, { \"id\": \"minimal-article-en\", \"title\": \"minimal-article-en\", \"date\": null, \"tags\": [], \"lang\": \"en\", \"content\": \"Article without frontmatter to test fallback.\\n\\nTitle should be filename, date null, and empty tags.\", \"html\": \"<p>Article without frontmatter to test fallback.</p>\\n<p>Title should be filename, date null, and empty tags.</p>\" }, { \"id\": \"minimal-article-it\", \"title\": \"minimal-article-it\", \"date\": null, \"tags\": [], \"lang\": \"it\", \"content\": \"Articolo senza frontmatter per testare il fallback.\\n\\nIl titolo dovrebbe essere il nome del file, la data null e i tags vuoti.\", \"html\": \"<p>Articolo senza frontmatter per testare il fallback.</p>\\n<p>Il titolo dovrebbe essere il nome del file, la data null e i tags vuoti.</p>\" } ], \"version\": \"2.0.0\" }"